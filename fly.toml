app = "teamflow-qa"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  DB_PATH = "/app/data/teamflow.db"

[mounts]
  source = "teamflow_data"
  destination = "/app/data"
