services:
  - type: web
    name: teamflow
    runtime: docker
    plan: free
    healthCheckPath: /api/bugs/presets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /app/data/teamflow.db
    disk:
      name: teamflow-data
      mountPath: /app/data
      sizeGB: 1
